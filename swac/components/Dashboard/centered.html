<div class="uk-child-width-1-2 uk-child-width-1-4@m uk-flex-center" uk-grid>
    <div id="tile-{id}" class="swac_repeatForSet" swac_parent="{parent}" draggable="true">
        <div class="uk-card uk-card-default uk-card-small uk-card-body">
            <h3 class="uk-card-title" swac_lang="{title}">{title}</h3>
            <p swac_lang="{desc}">{desc}</p>
            <div class="swac_dashboard_cardcont"></div>
            <p swac_lang="{subtitle}" class="uk-text-center">{subtitle}</p>
        </div>
    </div>
</div>
<br>
